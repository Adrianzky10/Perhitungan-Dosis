<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <form id="form">
        <h1>Perhitungan Dosis Buat Wulan Pradnya 🤍</h1>
        <label for="beratBadan">Berat badan pasien</label><br>
        <input type="number" name="beratBadan" id="beratBadan">
        <br>
        <label for="dosis">Dosis mg/kg berat badan</label><br>
        <input type="number" name="dosis" id="dosis">
        <br>
        <label for="jumlahMg">Jumlah mg</label><br>
        <input type="number" name="jumlahMg" id="jumlahMg">
        <br>
        <label for="volumeMl">Volume ml</label><br>
        <input type="number" name="volumeMl" id="volumeMl">
        <br>
        <button id="btnSubmit">Check</button>
        <h3 id="dosisResult"></h3>
        <h3 id="konsentrasi"></h3>
    </form>
    <script src="app.js"></script>
</body>
</html>
